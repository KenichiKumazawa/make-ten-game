<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎫 10つくり</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
    }

    .game {
      width: 100%;
      max-width: 360px;
      background: #fdf6e3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ヘッダー */
    .header {
      background: #1a1a2e;
      padding: 12px 16px 10px;
      text-align: center;
      position: relative;
    }
    .header-stripe {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
    }
    .header h1 {
      font-size: 1.2rem; font-weight: 900;
      color: #ffd93d; letter-spacing: 3px; margin-top: 4px;
    }
    .header p { font-size: 0.9rem; color: #ffd93d; font-weight: 900; margin-top: 6px; letter-spacing: 1px; }
    .mute-btn {
      position: absolute; top: 10px; right: 12px;
      background: none; border: 1px solid #555; border-radius: 50%;
      width: 36px; height: 36px; color: #aaa; font-size: 0.8rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* 切符エリア */
    .ticket-area { margin: 14px 14px 0; }
    .ticket {
      background: #fff; border: 3px solid #1a1a2e;
      border-radius: 10px; padding: 14px 12px;
      text-align: center; position: relative;
    }
    .ticket::before, .ticket::after {
      content: ''; position: absolute; top: 50%; transform: translateY(-50%);
      width: 12px; height: 12px; background: #fdf6e3;
      border-radius: 50%; border: 2px solid #b8860b;
    }
    .ticket::before { left: -8px; }
    .ticket::after  { right: -8px; }
    .ticket-stamp {
      position: absolute; top: 6px; right: 8px;
      font-size: 0.5rem; font-weight: 900; color: rgba(220,50,50,0.2);
      transform: rotate(20deg); line-height: 1.3;
      border: 2px solid rgba(220,50,50,0.15); border-radius: 4px; padding: 2px 4px;
    }
    .ticket-label {
      font-size: 0.6rem; font-weight: 700; color: #555;
      letter-spacing: 3px; margin-bottom: 8px;
    }
    .ticket-numbers { display: flex; justify-content: center; gap: 6px; }
    .num-card {
      border-radius: 8px; padding: 6px 8px;
      font-size: 1.4rem; font-weight: 900;
      min-width: 44px; text-align: center;
    }
    .color-0 { background: #c8a96e; color: #2c1810; box-shadow: 0 3px 0 #8b6914; }
    .color-1 { background: #c8a96e; color: #2c1810; box-shadow: 0 3px 0 #8b6914; }
    .color-2 { background: #c8a96e; color: #2c1810; box-shadow: 0 3px 0 #8b6914; }
    .color-3 { background: #c8a96e; color: #2c1810; box-shadow: 0 3px 0 #8b6914; }
    .tear-line { border-bottom: 2px dashed #b8860b; margin: 10px 0 0; }

    /* 式表示エリア */
    .formula-area {
      margin: 10px 14px;
      background: #fff; border: 2px solid #ddd; border-radius: 8px;
      padding: 10px 12px; min-height: 54px;
      display: flex; align-items: center; justify-content: center;
    }
    .formula-display {
      display: flex; align-items: center; gap: 4px;
      flex-wrap: wrap; justify-content: center;
    }
    .f-num {
      border-radius: 4px; padding: 2px 8px;
      font-size: 1.4rem; font-weight: 900;
    }
    .f-num.color-0 { color: #2c1810; }
    .f-num.color-1 { color: #2c1810; }
    .f-num.color-2 { color: #2c1810; }
    .f-num.color-3 { color: #2c1810; }
    .f-op  { font-size: 1.2rem; font-weight: 700; color: #555; }
    .f-blank { font-size: 0.9rem; color: #bbb; }
    .f-result { font-size: 1rem; font-weight: 900; color: #333; margin-left: 4px; }

    /* フィードバック */
    .feedback {
      text-align: center; font-size: 0.85rem; font-weight: 700;
      min-height: 26px; margin: 0 14px 6px; padding: 4px 8px;
      border-radius: 6px; line-height: 1.4;
    }
    @keyframes celebrate-pop {
      0%   { transform: scale(0.7); opacity: 0; }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes game-flash {
      0%,100% { box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
      40%     { box-shadow: 0 0 0 6px #ffd93d, 0 8px 48px rgba(255,217,61,0.6); }
    }
    .game.celebrating { animation: game-flash 0.7s ease-out; }
    .feedback.correct { background: #e8f5e9; color: #2e7d32; font-size: 1.1rem; padding: 10px 8px; animation: celebrate-pop 0.4s ease-out; }
    .feedback.wrong   { background: #ffebee; color: #c62828; }

    /* 数字ボタン */
    .input-section { margin: 0 14px 8px; }
    .section-label {
      font-size: 0.7rem; font-weight: 700; color: #555;
      text-align: center; margin-bottom: 5px;
    }
    .btn-row { display: flex; gap: 5px; justify-content: center; }
    .btn-num {
      border-radius: 8px; padding: 12px 0;
      font-size: 1.7rem; font-weight: 900;
      min-width: 66px; min-height: 60px; text-align: center;
      border: none; cursor: pointer; font-family: inherit;
      transition: transform 0.1s;
    }
    .btn-num:active { transform: scale(0.9); }
    .btn-num.used     { opacity: 0.2; pointer-events: none; }
    .btn-num.inactive { opacity: 0.35; pointer-events: none; }

    /* 記号ボタン */
    .btn-op {
      background: #ffd93d; color: #1a1a2e;
      border-radius: 8px; padding: 12px 0;
      font-size: 1.7rem; font-weight: 900;
      min-width: 66px; min-height: 60px; text-align: center;
      border: none; cursor: pointer; font-family: inherit;
      transition: transform 0.1s;
    }
    .btn-op:active   { transform: scale(0.9); }
    .btn-op.inactive { background: #d4ccc0; color: #aaa; opacity: 1; pointer-events: none; }

    /* アクションボタン行 */
    .action-row { margin: 4px 14px 14px; display: flex; gap: 6px; }
    .btn-reset {
      flex: 1; background: #f0e6d3; color: #555;
      border: 1px solid #c8a96e; border-radius: 8px;
      padding: 9px 4px; font-size: 0.7rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      min-height: 44px; transition: transform 0.1s;
    }
    .btn-hint {
      flex: 1; background: #fff3cd; color: #8b6914;
      border: 1px solid #f0c800; border-radius: 8px;
      padding: 9px 4px; font-size: 0.7rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      min-height: 44px; transition: transform 0.1s;
    }
    .btn-check {
      flex: 2; background: #1a1a2e; color: #ffd93d;
      border: none; border-radius: 8px;
      padding: 9px 4px; font-size: 0.75rem; font-weight: 900;
      cursor: pointer; font-family: inherit;
      min-height: 44px; transition: transform 0.1s;
    }
    .btn-reset:active, .btn-hint:active, .btn-check:active { transform: scale(0.95); }
    button:focus-visible { outline: 3px solid #ffd93d; outline-offset: 2px; }
    .btn-check:disabled { opacity: 0.35; pointer-events: none; }

    /* つぎへボタン */
    .btn-next {
      display: none;
      width: calc(100% - 28px); margin: 0 14px 14px;
      background: #6bcb77; color: #fff;
      border: none; border-radius: 8px;
      padding: 13px; font-size: 1rem; font-weight: 900;
      cursor: pointer; font-family: inherit;
      animation: pulse 1s ease-in-out infinite;
    }
    .btn-next.show { display: block; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.03); }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="header">
      <div class="header-stripe"></div>
      <button class="mute-btn" id="muteBtn">🔊</button>
      <h1>🎫 10つくり</h1>
      <p>4つの数で「10」をつくろう！</p>
    </div>

    <div class="ticket-area">
      <div class="ticket">
        <div class="ticket-stamp">きょうの<br>きっぷ</div>
        <div class="ticket-label" id="ticketNo">NO. ----</div>
        <div class="ticket-numbers" id="ticketNumbers">
          <!-- JS が描画 -->
        </div>
      </div>
      <div class="tear-line"></div>
    </div>

    <div class="formula-area">
      <div class="formula-display" id="formulaDisplay">
        <span class="f-blank">しきをつくってね…</span>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="input-section">
      <div class="section-label">数を えらぼう 👇</div>
      <div class="btn-row" id="numButtons"><!-- JS が描画 --></div>
    </div>

    <div class="input-section" style="margin-top:6px;">
      <div class="section-label">記号を えらぼう 👇</div>
      <div class="btn-row" id="opButtons"><!-- JS が描画 --></div>
    </div>

    <div class="action-row">
      <button class="btn-reset" id="resetBtn">↩ やり直す</button>
      <button class="btn-hint"  id="hintBtn">💡 ヒント</button>
      <button class="btn-check" id="checkBtn" disabled>✓ こたえあわせ！</button>
    </div>

    <button class="btn-next" id="nextBtn">つぎの切符へ ▶</button>
  </div>

  <script>
    // ===== 定数 =====
    const OPERATORS = ['+', '-', '×', '÷'];
    const COLORS    = ['color-0', 'color-1', 'color-2', 'color-3'];

    // ===== ゲーム状態 =====
    const state = {
      numbers:     [],          // e.g. [3, 1, 4, 2]
      formula:     [],          // [{type:'num', value:3, colorIdx:0}, {type:'op', value:'+'}, ...]
      usedIndices: new Set(),   // 使用済み数字のインデックス
      hint:        null,        // {nums:[...], ops:[...]} 解の1つ
      phase:       'num',       // 'num' | 'op' | 'done'
      solved:      false,
      muted:       false,
    };

    // ===== 問題生成 =====

    // 配列の全並び替えを返す
    function permutations(arr) {
      if (arr.length <= 1) return [arr.slice()];
      return arr.flatMap((v, i) => {
        const rest = [...arr.slice(0, i), ...arr.slice(i + 1)];
        return permutations(rest).map(p => [v, ...p]);
      });
    }

    // 1回の演算（÷0 は null を返す）
    function applyOp(a, op, b) {
      if (op === '+') return a + b;
      if (op === '-') return a - b;
      if (op === '×') return a * b;
      if (op === '÷') return b === 0 ? null : a / b;
      return null;
    }

    // 左から順に計算（括弧なし）
    function evalFormula(nums, ops) {
      let result = nums[0];
      for (let i = 0; i < ops.length; i++) {
        result = applyOp(result, ops[i], nums[i + 1]);
        if (result === null) return null;
      }
      return result;
    }

    // 4数字で10が作れるか総当たりで探す。解があれば {nums, ops} を返す
    function findSolution(numbers) {
      for (const perm of permutations(numbers)) {
        for (const op1 of OPERATORS)
        for (const op2 of OPERATORS)
        for (const op3 of OPERATORS) {
          const result = evalFormula(perm, [op1, op2, op3]);
          if (result !== null && Math.abs(result - 10) < 0.001) {
            return { nums: perm.slice(), ops: [op1, op2, op3] };
          }
        }
      }
      return null;
    }

    // 解ける問題を1つ生成して返す
    function generateProblem() {
      for (let attempt = 0; attempt < 100; attempt++) {
        const nums = Array.from({ length: 4 }, () => Math.floor(Math.random() * 10));
        const solution = findSolution(nums);
        if (solution) return { numbers: nums, hint: solution };
      }
      // フォールバック（必ず解ける問題）
      const fallback = [1, 2, 3, 4];
      return { numbers: fallback, hint: findSolution(fallback) };
    }

    // ===== UI描画 =====

    function renderTicket() {
      document.getElementById('ticketNo').textContent = 'NO. ' + state.numbers.join('');
      document.getElementById('ticketNumbers').innerHTML =
        state.numbers.map((n, i) =>
          `<div class="num-card ${COLORS[i]}">${n}</div>`
        ).join('');
    }

    function renderNumButtons() {
      document.getElementById('numButtons').innerHTML =
        state.numbers.map((n, i) => {
          const used     = state.usedIndices.has(i);
          const inactive = !used && state.phase !== 'num';
          return `<button class="btn-num ${COLORS[i]} ${used ? 'used' : ''} ${inactive ? 'inactive' : ''}"
            data-idx="${i}">${n}</button>`;
        }).join('');
    }

    function renderOpButtons() {
      const inactive = state.phase !== 'op';
      document.getElementById('opButtons').innerHTML =
        OPERATORS.map(op =>
          `<button class="btn-op ${inactive ? 'inactive' : ''}" data-op="${op}">${op}</button>`
        ).join('');
    }

    function renderFormula() {
      const display = document.getElementById('formulaDisplay');
      if (state.formula.length === 0) {
        display.innerHTML = '<span class="f-blank">しきをつくってね…</span>';
        return;
      }

      const nums = state.formula.filter(f => f.type === 'num').map(f => f.value);
      const ops  = state.formula.filter(f => f.type === 'op').map(f => f.value);

      let html = state.formula.map(item => {
        if (item.type === 'num') {
          return `<span class="f-num ${COLORS[item.colorIdx]}">${item.value}</span>`;
        }
        return `<span class="f-op">${item.value}</span>`;
      }).join('');

      // 現在の計算途中の結果を表示
      if (nums.length >= 2 && ops.length >= 1) {
        const r = evalFormula(nums, ops);
        if (r !== null) {
          const disp = Number.isInteger(r) ? r : r.toFixed(2);
          html += `<span class="f-result">＝${disp}</span>`;
        }
      }

      display.innerHTML = html;
    }

    function renderCheckBtn() {
      document.getElementById('checkBtn').disabled =
        state.formula.length < 7 || state.solved;
    }

    function render() {
      renderTicket();
      renderNumButtons();
      renderOpButtons();
      renderFormula();
      renderCheckBtn();
    }

    // ===== 初期化 =====
    function startNewProblem() {
      const { numbers, hint } = generateProblem();
      state.numbers     = numbers;
      state.hint        = hint;
      state.formula     = [];
      state.usedIndices = new Set();
      state.phase       = 'num';
      state.solved      = false;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className   = 'feedback';
      document.getElementById('nextBtn').classList.remove('show');
      render();
    }

    // ===== 入力処理 =====

    function selectNumber(idx) {
      if (state.phase !== 'num' || state.usedIndices.has(idx) || state.solved) return;
      state.formula.push({ type: 'num', value: state.numbers[idx], colorIdx: idx });
      state.usedIndices.add(idx);
      state.phase = state.usedIndices.size === 4 ? 'done' : 'op';
      playClick();
      render();
    }

    function selectOperator(op) {
      if (state.phase !== 'op' || state.solved) return;
      state.formula.push({ type: 'op', value: op });
      state.phase = 'num';
      playClick();
      render();
    }

    function reset() {
      state.formula     = [];
      state.usedIndices = new Set();
      state.phase       = 'num';
      state.solved      = false;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className   = 'feedback';
      document.getElementById('nextBtn').classList.remove('show');
      render();
    }

    // ===== サウンド =====

    let audioCtx = null;

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playNoiseBurst(freq, gain, duration) {
      if (state.muted) return;
      const ctx = getCtx();
      const bufLen = Math.floor(ctx.sampleRate * duration);
      const buf    = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data   = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      const src    = ctx.createBufferSource();
      src.buffer   = buf;
      const filter = ctx.createBiquadFilter();
      filter.type  = 'lowpass';
      filter.frequency.value = freq;
      const g = ctx.createGain();
      g.gain.setValueAtTime(gain, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      src.connect(filter); filter.connect(g); g.connect(ctx.destination);
      src.start(); src.stop(ctx.currentTime + duration);
    }

    function playTone(freq, duration, gain = 0.25, type = 'sine', delayMs = 0) {
      if (state.muted) return;
      setTimeout(() => {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.type  = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(gain, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + duration);
      }, delayMs);
    }

    function playClick()      { playNoiseBurst(1200, 0.12, 0.04); }
    function playCorrect()    { [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.25, 0.3, 'sine', i * 80)); }
    function playWrong()      { playTone(220, 0.25, 0.3, 'sawtooth', 0); playTone(196, 0.25, 0.3, 'sawtooth', 150); }
    function playHintChime()  { playTone(880, 0.2, 0.2, 'sine', 0); playTone(1109, 0.2, 0.2, 'sine', 150); }

    let bgmTimer = null;
    let bgmBeat  = 0;
    const BGM_PATTERN = [
      { freq: 90,  gain: 0.35, dur: 0.09 },
      null,
      { freq: 160, gain: 0.18, dur: 0.06 },
      null,
    ];

    function tickBGM() {
      if (!state.muted) {
        const beat = BGM_PATTERN[bgmBeat % BGM_PATTERN.length];
        if (beat) playNoiseBurst(beat.freq, beat.gain, beat.dur);
      }
      bgmBeat++;
    }

    function startBGM() {
      if (bgmTimer) return;
      bgmBeat  = 0;
      bgmTimer = setInterval(tickBGM, 260);
    }

    function stopBGM() {
      clearInterval(bgmTimer);
      bgmTimer = null;
    }

    document.getElementById('muteBtn').addEventListener('click', () => {
      state.muted = !state.muted;
      document.getElementById('muteBtn').textContent = state.muted ? '🔇' : '🔊';
      state.muted ? stopBGM() : startBGM();
    });

    document.addEventListener('click', () => { if (!state.muted) startBGM(); }, { once: true });

    // ===== 答え合わせ・ヒント =====

    function checkAnswer() {
      if (state.formula.length < 7) return;
      const nums = state.formula.filter(f => f.type === 'num').map(f => f.value);
      const ops  = state.formula.filter(f => f.type === 'op').map(f => f.value);
      const result = evalFormula(nums, ops);

      const fb = document.getElementById('feedback');
      if (result !== null && Math.abs(result - 10) < 0.001) {
        fb.textContent = '🎊 正解！ すごい！ 🎊';
        fb.className   = 'feedback correct';
        state.solved   = true;
        playCorrect();
        const game = document.querySelector('.game');
        game.classList.remove('celebrating');
        void game.offsetWidth;
        game.classList.add('celebrating');
        document.getElementById('nextBtn').classList.add('show');
      } else {
        const disp = result === null ? '？' : (Number.isInteger(result) ? result : result.toFixed(2));
        const h = state.hint;
        const example = h ? `${h.nums[0]}${h.ops[0]}${h.nums[1]}${h.ops[1]}${h.nums[2]}${h.ops[2]}${h.nums[3]}=10` : '';
        fb.innerHTML = `ざんねん！（こたえ: ${disp}）<br><span style="font-size:0.8em">れい: ${example}</span>`;
        fb.className   = 'feedback wrong';
        document.getElementById('nextBtn').classList.add('show');
        playWrong();
      }
      render();
    }

    function showHint() {
      if (!state.hint) return;
      const { nums, ops } = state.hint;
      const fb = document.getElementById('feedback');
      fb.textContent = `💡 ヒント：「${nums[0]} ${ops[0]}」からはじめよう！`;
      fb.className   = 'feedback';
      playHintChime();
    }

    // イベント委任でボタンを配線
    document.getElementById('numButtons').addEventListener('click', e => {
      const btn = e.target.closest('[data-idx]');
      if (btn) selectNumber(Number(btn.dataset.idx));
    });

    document.getElementById('opButtons').addEventListener('click', e => {
      const btn = e.target.closest('[data-op]');
      if (btn) selectOperator(btn.dataset.op);
    });

    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('nextBtn').addEventListener('click', startNewProblem);
    document.getElementById('checkBtn').addEventListener('click', checkAnswer);
    document.getElementById('hintBtn').addEventListener('click', showHint);

    startNewProblem();
  </script>
</body>
</html>
